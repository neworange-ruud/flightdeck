name: Web deploy

# Deploy the FlightDeck web app (Next.js landing page + docs) to Azure Container
# Apps when a GitHub Release is published (or on manual dispatch).
#
# Auth is GitHub OIDC -> the same Azure user-assigned managed identity the relay
# deploy uses, whose federated credential is scoped to this repo's `production`
# environment. No long-lived Azure secret is stored in the repo. The identity
# has AcrPush on the registry and Contributor on the web container app (granted
# by web/deploy/setup.sh).
#
# NOTE: `release` events always run the workflow file as it exists on the
# repository's DEFAULT branch — this file must be on `main` for release
# publishes to trigger it.

on:
  # A release published by cargo-dist is created with GITHUB_TOKEN, which by
  # design does NOT fire `release: published` — so the tag push is what actually
  # triggers the deploy on a real release. Same pattern as release.yml. The
  # `release`/`workflow_dispatch` triggers stay as fallbacks (manual UI release,
  # ad-hoc redeploy).
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to build & deploy (defaults to the commit SHA)"
        required: false

concurrency:
  group: web-deploy
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    working-directory: web

jobs:
  deploy:
    name: build + deploy (Azure Container Apps)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # required for OIDC token issuance

    steps:
      - uses: actions/checkout@v4

      - name: Check Azure wiring
        run: |
          missing=
          [ -n "${{ secrets.AZURE_CLIENT_ID }}" ]           || missing="$missing AZURE_CLIENT_ID"
          [ -n "${{ secrets.AZURE_TENANT_ID }}" ]           || missing="$missing AZURE_TENANT_ID"
          [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]     || missing="$missing AZURE_SUBSCRIPTION_ID"
          [ -n "${{ vars.AZURE_RESOURCE_GROUP }}" ]         || missing="$missing AZURE_RESOURCE_GROUP"
          [ -n "${{ vars.AZURE_ACR_NAME }}" ]               || missing="$missing AZURE_ACR_NAME"
          [ -n "${{ vars.AZURE_WEB_CONTAINERAPP_NAME }}" ]  || missing="$missing AZURE_WEB_CONTAINERAPP_NAME"
          if [ -n "$missing" ]; then
            echo "::error::Missing Azure deploy config:$missing — see web/deploy/README.md"
            exit 1
          fi

      - name: Resolve image tag
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -n "$TAG" ] || TAG="${{ inputs.image_tag }}"
          # On a tag push there's no release payload — use the tag itself.
          if [ -z "$TAG" ] && [ "${{ github.ref_type }}" = "tag" ]; then TAG="${{ github.ref_name }}"; fi
          [ -n "$TAG" ] || TAG="${GITHUB_SHA::7}"
          TAG="$(echo "$TAG" | tr -c 'A-Za-z0-9_.-' '-')"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Cloud-build in ACR (no Docker-in-Actions). Context is web/ (the app
      # path-depends on ./docs-platform); tag with both the release tag and the
      # short SHA so the registry keeps a SHA-addressable image too.
      - name: Build image (ACR cloud build)
        run: |
          set -euo pipefail
          ACR="${{ vars.AZURE_ACR_NAME }}"
          IMAGE="$ACR.azurecr.io/flightdeck-web:${{ steps.meta.outputs.tag }}"
          IMAGE_SHA="$ACR.azurecr.io/flightdeck-web:${{ steps.meta.outputs.sha }}"
          az acr build --registry "$ACR" \
            --image "flightdeck-web:${{ steps.meta.outputs.tag }}" \
            --image "flightdeck-web:${{ steps.meta.outputs.sha }}" \
            --file Dockerfile .
          # Deploy BY DIGEST: a moving tag lets Container Apps reuse a cached
          # image for the new revision, silently serving stale bits.
          DIGEST=$(az acr repository show -n "$ACR" \
            --image "flightdeck-web:${{ steps.meta.outputs.tag }}" --query digest -o tsv)
          echo "IMAGE=$ACR.azurecr.io/flightdeck-web@$DIGEST" >> "$GITHUB_ENV"

      - name: Deploy revision
        run: |
          set -euo pipefail
          az containerapp update \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEB_CONTAINERAPP_NAME }}" \
            --image "$IMAGE"

      - name: Verify the site responds
        run: |
          set -euo pipefail
          FQDN=$(az containerapp show \
            -g "${{ vars.AZURE_RESOURCE_GROUP }}" \
            -n "${{ vars.AZURE_WEB_CONTAINERAPP_NAME }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "web: https://$FQDN"
          # The ingress is IP-restricted; the GitHub runner is not allowlisted,
          # so a 403 here still proves the new revision is serving. Any 2xx/3xx
          # or 403 means the app is up; a connection failure or 5xx is a failure.
          for i in $(seq 1 30); do
            code="$(curl -s -o /dev/null -w '%{http_code}' "https://$FQDN/" || echo 000)"
            echo "attempt $i: HTTP $code"
            case "$code" in 2*|3*|403) echo "✓ revision live"; exit 0;; esac
            sleep 5
          done
          echo "::error::web app did not respond after ~150s"
          exit 1
