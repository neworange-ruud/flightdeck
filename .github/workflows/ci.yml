name: CI

# Run on pushes to main (post-merge) and on every pull request. Deliberately NOT
# on pushes to feature branches: a `flightdeck/**` push and its `pull_request`
# fire for the same commit under different refs (refs/heads/... vs refs/pull/N),
# so their concurrency groups never collide and the whole matrix ran twice in
# parallel. PRs are where checks matter, so let the PR event own feature-branch CI.
on:
  push:
    branches: ["main"]
  pull_request:

# Cancel superseded runs on the same PR/branch to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Formatting is platform-independent — check it once.
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Clippy + tests on every supported platform. Each OS is the point: windows-latest
  # exercises the #[cfg(windows)] paths (shell resolution, command discovery,
  # clipboard) and ubuntu-latest exercises the #[cfg(target_os = "linux")] paths
  # (clipboard via xclip/wl-copy, podman runtime, notify-send) — neither of which
  # the macOS host build touches.
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    # Backstop against a hung test (a blocking mock socket, a deadlock): fail in
    # minutes instead of parking a runner for GitHub's 360-minute default.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --locked
