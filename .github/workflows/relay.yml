name: Relay

# The relay lives in its own Cargo workspace (`remote/`), independent of the
# root `flightdeck` crate — only run this workflow when something under
# `remote/` (or this workflow file itself) actually changed.
on:
  push:
    branches: ["main", "flightdeck/**"]
    paths:
      - "remote/**"
      - ".github/workflows/relay.yml"
  pull_request:
    paths:
      - "remote/**"
      - ".github/workflows/relay.yml"

concurrency:
  group: relay-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

defaults:
  run:
    working-directory: remote

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -p flightdeck-relay -- --check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: remote -> target
      - name: Clippy
        run: cargo clippy -p flightdeck-relay --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test -p flightdeck-relay --locked

  docker:
    name: docker build
    needs: [fmt, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build-only: this job proves the image builds, it doesn't push
      # anywhere. Build context is `remote/` (see relay/Dockerfile's header
      # comment) since the relay path-depends on `../protocol`.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: remote
          file: remote/relay/Dockerfile
          push: false
          tags: flightdeck-relay:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy (Azure Container Apps)
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Deploy secrets are provisioned once, by hand, following
      # `remote/relay/deploy/README.md` — they don't exist on this repo yet.
      # Every step below is gated on their presence so this job reports
      # green (with a clear "skipped, no credentials" note) instead of
      # failing until that one-time setup happens.
      - name: Check for Azure deploy credentials
        id: check
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ] || \
             [ -z "${{ vars.AZURE_RESOURCE_GROUP }}" ] || \
             [ -z "${{ vars.AZURE_ACR_NAME }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no Azure credentials configured)
        if: steps.check.outputs.ready == 'false'
        run: |
          echo "::notice::AZURE_CREDENTIALS / AZURE_RESOURCE_GROUP / AZURE_ACR_NAME are not set on this repository yet. Skipping deploy — see remote/relay/deploy/README.md for one-time setup." \
            | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Azure login
        if: steps.check.outputs.ready == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image
        if: steps.check.outputs.ready == 'true'
        run: |
          az acr login --name "${{ vars.AZURE_ACR_NAME }}"
          IMAGE="${{ vars.AZURE_ACR_NAME }}.azurecr.io/flightdeck-relay:${{ github.sha }}"
          docker build -f relay/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # GIT_SHA is a runtime Container Apps env var (see
      # relay/deploy/containerapp.yaml and Config::git_sha), not baked into
      # the image at build time — set it here alongside the new image so
      # `/version` reports the revision actually running.
      - name: Deploy revision
        if: steps.check.outputs.ready == 'true'
        run: |
          az containerapp update \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name flightdeck-relay \
            --image "$IMAGE" \
            --set-env-vars "GIT_SHA=${{ github.sha }}"
