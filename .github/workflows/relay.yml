name: Relay

# The relay lives in its own Cargo workspace (`remote/`), independent of the
# root `flightdeck` crate — only run this workflow when something under
# `remote/` (or this workflow file itself) actually changed.
on:
  push:
    branches: ["main", "flightdeck/**"]
    paths:
      - "remote/**"
      - ".github/workflows/relay.yml"
  pull_request:
    paths:
      - "remote/**"
      - ".github/workflows/relay.yml"

concurrency:
  group: relay-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

defaults:
  run:
    working-directory: remote

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -p flightdeck-relay -- --check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: remote -> target
      - name: Clippy
        run: cargo clippy -p flightdeck-relay --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test -p flightdeck-relay --locked

  docker:
    name: docker build
    needs: [fmt, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build-only: this job proves the image builds, it doesn't push
      # anywhere. Build context is `remote/` (see relay/Dockerfile's header
      # comment) since the relay path-depends on `../protocol`.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: remote
          file: remote/relay/Dockerfile
          push: false
          tags: flightdeck-relay:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deployment to Azure Container Apps is NOT here — it runs from
  # `.github/workflows/relay-deploy.yml` when a GitHub Release is published
  # (OIDC auth, no stored secret). This workflow is CI only: it proves the
  # relay formats, tests, and builds on every push/PR touching `remote/**`.
