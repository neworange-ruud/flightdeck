name: Relay deploy

# Deploy the FlightDeck Remote relay to Azure Container Apps when a GitHub
# Release is published (or on manual dispatch).
#
# Auth is GitHub OIDC → an Azure *user-assigned managed identity* whose
# federated credential is scoped to this repo's `production` environment. No
# long-lived Azure secret is stored in the repo: `azure/login` exchanges the
# short-lived GitHub OIDC token for an Azure token at run time. The identity is
# granted only what it needs — AcrPush on the registry and Contributor on the
# single container app (see remote/relay/deploy/README.md).
#
# NOTE: `release` events always run the workflow file as it exists on the
# repository's DEFAULT branch — this file must be on `main` for release
# publishes to trigger it.

on:
  # A release published by cargo-dist is created with GITHUB_TOKEN, which by
  # design does NOT fire `release: published` — so the tag push is what actually
  # triggers the deploy on a real release. Same pattern as release.yml. The
  # `release`/`workflow_dispatch` triggers stay as fallbacks (manual UI release,
  # ad-hoc redeploy).
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to build & deploy (defaults to the commit SHA)"
        required: false

concurrency:
  # Never cancel an in-flight deploy; queue instead.
  group: relay-deploy
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    working-directory: remote

jobs:
  deploy:
    name: build + deploy (Azure Container Apps)
    runs-on: ubuntu-latest
    # Binds the run to the `production` environment, which is what the Azure
    # federated credential's subject (`repo:<owner>/<repo>:environment:production`)
    # matches — the OIDC login fails for any run not bound to this environment.
    environment: production
    permissions:
      contents: read
      id-token: write # required for OIDC token issuance

    steps:
      - uses: actions/checkout@v4

      # Fail early and clearly if the one-time Azure wiring (see deploy/README)
      # isn't present — e.g. on a fork — instead of a confusing login error.
      - name: Check Azure wiring
        run: |
          missing=
          [ -n "${{ secrets.AZURE_CLIENT_ID }}" ]        || missing="$missing AZURE_CLIENT_ID"
          [ -n "${{ secrets.AZURE_TENANT_ID }}" ]        || missing="$missing AZURE_TENANT_ID"
          [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]  || missing="$missing AZURE_SUBSCRIPTION_ID"
          [ -n "${{ vars.AZURE_RESOURCE_GROUP }}" ]      || missing="$missing AZURE_RESOURCE_GROUP"
          [ -n "${{ vars.AZURE_ACR_NAME }}" ]            || missing="$missing AZURE_ACR_NAME"
          [ -n "${{ vars.AZURE_CONTAINERAPP_NAME }}" ]   || missing="$missing AZURE_CONTAINERAPP_NAME"
          if [ -n "$missing" ]; then
            echo "::error::Missing Azure deploy config:$missing — see remote/relay/deploy/README.md"
            exit 1
          fi
          # remote-control-uq7: the relay's network-admission gate is now the
          # shared FLIGHTDECK_RELAY_PASSWORD (replacing the ingress IP allowlist).
          # Warn — don't fail — if it isn't set, so an environment mid-migration
          # can still deploy; the relay simply runs OPEN until the secret exists.
          if [ -z "${{ secrets.FLIGHTDECK_RELAY_PASSWORD }}" ]; then
            echo "::warning::FLIGHTDECK_RELAY_PASSWORD secret is not set — the relay will run OPEN (no password gate). Set it in the production environment secrets."
          fi

      - name: Resolve image tag
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -n "$TAG" ] || TAG="${{ inputs.image_tag }}"
          # On a tag push there's no release payload — use the tag itself.
          if [ -z "$TAG" ] && [ "${{ github.ref_type }}" = "tag" ]; then TAG="${{ github.ref_name }}"; fi
          [ -n "$TAG" ] || TAG="${GITHUB_SHA::7}"
          # Sanitize to a valid Docker tag (anything else → '-').
          TAG="$(printf '%s' "$TAG" | tr -c 'A-Za-z0-9_.-' '-')"
          echo "tag=$TAG"            >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Build context is `remote/` (this crate path-depends on ../protocol);
      # see relay/Dockerfile's header. Tag with both the release tag and the
      # short SHA so the registry keeps a SHA-addressable image too.
      - name: Build and push image
        run: |
          set -euo pipefail
          ACR="${{ vars.AZURE_ACR_NAME }}"
          az acr login --name "$ACR"
          IMAGE="$ACR.azurecr.io/flightdeck-relay:${{ steps.meta.outputs.tag }}"
          IMAGE_SHA="$ACR.azurecr.io/flightdeck-relay:${{ steps.meta.outputs.sha }}"
          docker build -f relay/Dockerfile -t "$IMAGE" -t "$IMAGE_SHA" .
          docker push "$IMAGE"
          docker push "$IMAGE_SHA"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # remote-control-uq7: open the ingress by removing any source-IP allowlist.
      # The relay is now gated by the shared FLIGHTDECK_RELAY_PASSWORD, not by a
      # deny-by-default IP allowlist — which blocked roaming phones on 5G. This is
      # idempotent: an ingress with no rules is already open, so a fresh app or a
      # re-run is a no-op.
      - name: Open ingress (remove IP allowlist)
        run: |
          set -euo pipefail
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          APP="${{ vars.AZURE_CONTAINERAPP_NAME }}"
          rules="$(az containerapp ingress access-restriction list -g "$RG" -n "$APP" -o json 2>/dev/null || echo '[]')"
          echo "$rules" | jq -r '.[].name' | while read -r name; do
            [ -n "$name" ] || continue
            echo "removing ingress access-restriction rule: $name"
            az containerapp ingress access-restriction remove -g "$RG" -n "$APP" --rule-name "$name"
          done

      # GIT_SHA is a runtime env var (Config::git_sha → /version), set alongside
      # the new image so /version reports the revision actually running. The
      # shared relay password (remote-control-uq7) is stored as a Container App
      # *secret* and referenced by env var, so it never appears in plaintext in
      # the revision template. Skipped when the secret is unset (relay runs open).
      - name: Deploy revision
        env:
          RELAY_PASSWORD: ${{ secrets.FLIGHTDECK_RELAY_PASSWORD }}
        run: |
          set -euo pipefail
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          APP="${{ vars.AZURE_CONTAINERAPP_NAME }}"
          PW_ENV=""
          if [ -n "$RELAY_PASSWORD" ]; then
            az containerapp secret set -g "$RG" -n "$APP" \
              --secrets "relay-password=$RELAY_PASSWORD"
            PW_ENV="FLIGHTDECK_RELAY_PASSWORD=secretref:relay-password"
          fi
          az containerapp update \
            --resource-group "$RG" \
            --name "$APP" \
            --image "$IMAGE" \
            --set-env-vars "GIT_SHA=${{ github.sha }}" $PW_ENV

      - name: Verify the new revision is live and healthy
        run: |
          set -euo pipefail
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          APP="${{ vars.AZURE_CONTAINERAPP_NAME }}"
          FQDN=$(az containerapp show -g "$RG" -n "$APP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "relay: https://$FQDN"
          # Verify via the control plane (the deploy identity has Contributor on
          # the app): the latest active revision must be Healthy, running, and
          # carry the GIT_SHA we just deployed. This confirms the exact revision.
          want="$GITHUB_SHA"
          for i in $(seq 1 30); do
            rev="$(az containerapp revision list -g "$RG" -n "$APP" -o json \
              | jq -c 'map(select(.properties.active))
                       | sort_by(.properties.createdTime) | last
                       | {health: .properties.healthState,
                          running: .properties.runningState,
                          sha: (.properties.template.containers[0].env // []
                                | map(select(.name=="GIT_SHA"))[0].value)}')"
            echo "attempt $i: $rev"
            if [ "$(echo "$rev" | jq -r '.health')"  = "Healthy" ] \
               && [ "$(echo "$rev" | jq -r '.sha')"  = "$want" ] \
               && [ "$(echo "$rev" | jq -r '.running')" != "Stopped" ]; then
              echo "✓ new revision live and healthy (git_sha=$want)"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "::error::relay's latest active revision did not become Healthy with git_sha $want after ~150s"
              exit 1
            fi
            sleep 5
          done
          # remote-control-uq7: the ingress no longer IP-restricts, so this GitHub
          # runner (a non-allowlisted network) can now reach the relay directly.
          # Curling /version from here is a live proof that the allowlist is gone
          # and the relay is reachable from anywhere — the exact property that was
          # broken for roaming phones. /version and the health probes sit ahead of
          # the password gate, so no password is needed to reach them.
          echo "checking public reachability of https://$FQDN/version"
          code="$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 15 --retry 5 --retry-delay 3 "https://$FQDN/version" || true)"
          if [ "$code" != "200" ]; then
            echo "::error::relay /version was not publicly reachable (HTTP $code) — ingress may still be IP-restricted"
            exit 1
          fi
          echo "✓ relay reachable from a non-allowlisted network (HTTP 200)"
