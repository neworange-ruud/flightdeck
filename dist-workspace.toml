[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app. "powershell" is the Windows
# counterpart to the Unix "shell" installer (irm <url> | iex).
installers = ["shell", "homebrew", "powershell"]
# Package-manager publishing jobs to run after GitHub artifacts are hosted
publish-jobs = ["homebrew"]
# Target platforms to build apps for (Rust target-triple syntax). Windows ships
# as x86_64-pc-windows-msvc (built on a GitHub windows runner). The released
# windows binary is pure-Rust: the self-update deps are target-gated out in
# Cargo.toml so the build needs no C toolchain (no CMake/NASM/aws-lc-sys).
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Homebrew tap to publish the formula to during release CI.
tap = "neworange-ruud/homebrew-tap"
formula = "flightdeck"
# Whether to install an updater program
install-updater = false
# Code-sign macOS binaries with an Apple Developer ID certificate.
# Requires CODESIGN_CERTIFICATE, CODESIGN_CERTIFICATE_PASSWORD, and
# CODESIGN_IDENTITY secrets in CI. (Signing only; cargo-dist does not notarize.)
macos-sign = true
# Custom build-job steps (relative to .github/workflows/). build-setup.steps sets
# CODESIGN_OPTIONS=runtime so the macOS signer enables the hardened runtime.
github-build-setup = "build-setup.steps"
