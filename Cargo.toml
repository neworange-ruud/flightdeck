[package]
name = "flightdeck"
version = "0.1.0"
edition = "2021"

[lib]
name = "flightdeck"
path = "src/lib.rs"

[[bin]]
name = "flightdeck"
path = "src/main.rs"

[dependencies]
crossterm = "0.29.0"
portable-pty = "0.9.0"
ratatui = "0.30.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
toml = "1.1.2"
vt100 = "0.16.2"

[dev-dependencies]
insta = "1.48.0"
tempfile = "3.27.0"
