[package]
name = "flightdeck"
version = "1.0.1"
edition = "2021"
description = "A macOS-first terminal UI for orchestrating multiple local AI coding agents in isolated Git worktrees."
repository = "https://github.com/neworange-ruud/flightdeck"
homepage = "https://github.com/neworange-ruud/flightdeck"
readme = "README.md"
license = "MIT"
keywords = ["ai", "agents", "git", "tui", "worktree"]
categories = ["command-line-utilities", "development-tools"]

[lib]
name = "flightdeck"
path = "src/lib.rs"

[[bin]]
name = "flightdeck"
path = "src/main.rs"

[dependencies]
# Self-update for installer-based installs (`flightdeck update`). The `blocking`
# feature exposes the `*_sync` methods so we avoid pulling an async runtime into
# the otherwise-synchronous TUI; `github_releases` (a default feature) points the
# updater at our GitHub Releases. See src/update.rs.
axoupdater = { version = "0.10", features = ["blocking"] }
crossterm = "0.29.0"
portable-pty = "0.9.0"
ratatui = "0.30.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
toml = "1.1.2"
vt100 = "0.16.2"

[dev-dependencies]
insta = "1.48.0"
tempfile = "3.27.0"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
