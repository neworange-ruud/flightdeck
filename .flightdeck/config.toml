# FlightDeck project configuration (<repo>/.flightdeck/config.toml).
#
# Only values that differ from the global config (~/.flightdeck/config.toml)
# need to live here. Anything omitted is inherited from the global base.

[agents.claude]
args = []
command = "claude"
display_name = "Claude Code"

[agents.claude.status_patterns]
completed = []
error = []
waiting = []

[agents.codex]
args = []
command = "codex"
display_name = "Codex CLI"

[agents.codex.status_patterns]
completed = []
error = []
waiting = []

[agents.opencode]
args = []
command = "opencode"
display_name = "OpenCode"

[agents.opencode.status_patterns]
completed = [
    "Done",
    "Complete",
    "Task complete",
]
error = [
    "Error",
    "Failed",
]
waiting = [
    "Proceed?",
    "Confirm",
    "Approve",
    "Do you want to",
]

[git]
branch_prefix = "flightdeck/"
default_remote = "origin"
primary_host = "github"

[project]
default_base_branch = "main"
name = "flightdeck"

[ui]
agent_tab_position = "left"
default_agent = "opencode"

[update]
check = true

[worktrees]
root = ".flightdeck/worktrees"
